{% extends 'base.html' %}

{% block title %}Registrar Paciente{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="mockup">
        <h2 style="font-weight: 800; font-size: 1.5rem; letter-spacing: -0.04em; margin-bottom: 30px;">REGISTRO CLÍNICO
            (S1)</h2>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase;">Nombre
                    del Paciente</label>
                <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required
                    style="width: 100%; padding: 12px; background: var(--navy); border: 1px solid var(--border); color: white; border-radius: 6px; font-family: 'Inter'; outline: none;">
            </div>

            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase;">DNI
                    / Identificación</label>
                <input type="text" name="dni" placeholder="8 dígitos" required
                    style="width: 100%; padding: 12px; background: var(--navy); border: 1px solid var(--border); color: white; border-radius: 6px; font-family: 'Inter'; outline: none;">
            </div>

            <div style="margin-bottom: 30px;">
                <label
                    style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase;">Enfermedad
                    Crónica</label>
                <select name="enfermedad"
                    style="width: 100%; padding: 12px; background: var(--navy); border: 1px solid var(--border); color: white; border-radius: 6px; font-family: 'Inter'; outline: none;">
                    <option value="Diabetes Tipo 2">Diabetes Tipo 2</option>
                    <option value="Hipertensión Arterial">Hipertensión Arterial</option>
                    <option value="Asma">Asma</option>
                </select>
            </div>

            <button type="submit"
                style="width: 100%; padding: 14px; background: var(--teal); color: var(--navy); border: none; border-radius: 6px; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-transform: uppercase;">
                Dar de Alta Paciente
            </button>
            <a href="{% url 'dashboard' %}"
                style="display: block; text-align: center; margin-top: 15px; color: var(--muted); font-size: 0.75rem; text-decoration: none;">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
