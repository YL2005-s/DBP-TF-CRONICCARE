<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CronicCare — Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #050a14;
            --navy2: #0b121f;
            --teal: #00f2ff;
            --teal2: #00b8c4;
            --white: #f8fafc;
            --muted: #64748b;
            --alert: #ff4757;
            --warning: #ffa502;
            --ok: #2ed573;
            --card-bg: #0f172a;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--teal);
            letter-spacing: -0.03em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .logo span {
            color: var(--white);
            font-weight: 400;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="logo">Cronic<span>Care</span></div>

    <div class="card">
        <div style="margin-bottom: 32px;">
            <h2 style="font-weight: 800; font-size: 1.4rem; letter-spacing: -0.04em; margin-bottom: 6px;">
                ACCESO AL SISTEMA
            </h2>
            <p style="color: var(--muted); font-size: 0.8rem;">
                Telemonitoreo de Pacientes Crónicos
            </p>
        </div>

        {% if form.errors %}
        <div style="margin-bottom: 20px; padding: 12px 16px; border-radius: 6px; background: rgba(255, 71, 87, 0.08); border: 1px solid rgba(255, 71, 87, 0.25);">
            <p style="color: var(--alert); font-size: 0.78rem; font-weight: 700; margin-bottom: 4px;">
                CREDENCIALES INCORRECTAS
            </p>
            <p style="color: var(--muted); font-size: 0.75rem;">
                El usuario o la contraseña no son válidos. Inténtalo de nuevo.
            </p>
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.68rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">
                    Usuario
                </label>
                <input
                    type="text"
                    name="username"
                    autofocus
                    required
                    placeholder="Nombre de usuario"
                    style="width: 100%; padding: 12px 14px; background: var(--navy); border: 1px solid var(--border); color: var(--white); border-radius: 6px; font-family: 'Inter'; font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--teal)'"
                    onblur="this.style.borderColor='var(--border)'"
                >
            </div>

            <div style="margin-bottom: 28px;">
                <label style="display: block; font-size: 0.68rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">
                    Contraseña
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    placeholder="••••••••"
                    style="width: 100%; padding: 12px 14px; background: var(--navy); border: 1px solid var(--border); color: var(--white); border-radius: 6px; font-family: 'Inter'; font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--teal)'"
                    onblur="this.style.borderColor='var(--border)'"
                >
            </div>

            <button
                type="submit"
                style="width: 100%; padding: 13px; background: var(--teal); color: var(--navy); border: none; border-radius: 6px; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: opacity 0.2s;"
                onmouseover="this.style.opacity='0.85'"
                onmouseout="this.style.opacity='1'"
            >
                Ingresar al Sistema
            </button>
        </form>
    </div>

</body>
</html>
